name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # npm 11+ required for GitHub OIDC trusted publishing (provenance).
      - name: Install npm 11
        run: npm install -g npm@11.5.2

      - name: Install native build tools for better-sqlite3
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test
        run: pnpm -r build && pnpm -r test

      - name: Publish to npm
        run: |
          set -euo pipefail
          for dir in \
            packages/core \
            packages/adapter-claude-code \
            packages/adapter-codex \
            packages/adapter-cursor \
            packages/adapter-opencode \
            packages/server; do
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            # Idempotent: skip versions already on npm, so a partial-failure run
            # is safe to re-run (otherwise it 403s on the already-published ones
            # and aborts the rest). A package missing its GitHub Actions Trusted
            # Publisher still 404s on OIDC publish — configure it on npmjs.com.
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "Skip $name@$ver (already published)"
              continue
            fi
            echo "Publishing $name@$ver..."
            (cd "$dir" && pnpm publish --access public --no-git-checks --provenance)
          done
